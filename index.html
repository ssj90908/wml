<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 微信测试</title>
    <style>
        iframe { width: 100%; height: 500px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <!-- 测试一个已知肯定不允许 iframe 的网站，如淘宝 -->
    <h3>测试 iframe 加载：</h3>
    <iframe id="myFrame" src="https://a.6611.fun/group.php/index/share/id/145/t/f6d161e1809b714811a64697602cc240/time/1773506499.html"></iframe>

    <script>
        var iframe = document.getElementById('myFrame');
        iframe.onload = function() {
            console.log("iframe 加载完成事件触发");
            alert("iframe 触发了 onload，但这不代表内容一定渲染出来了（可能是空白页或拦截页）。");
        };
        
        iframe.onerror = function() {
            alert("iframe 加载出错");
        };
    </script>
</body>
</html>
