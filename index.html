<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>加入群聊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden; /* 避免双层滚动条 */
        }
        .title {
            padding: 12px 16px;
            font-size: 16px;
            background: #f5f5f5;
        }
        #loadTip {
            padding: 8px 16px;
            color: #666;
            font-size: 14px;
        }
        /* 全屏自适应 iframe */
        iframe {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    border: none;
        }
    </style>
</head>
<body>

    <iframe id="myFrame" src="https://a.6611.fun/group.php/index/share/id/145/t/f6d161e1809b714811a64697602cc240/time/1773506499.html"></iframe>

    <script>
        var iframe = document.getElementById('myFrame');
        var loadTip = document.getElementById('loadTip');

        iframe.onload = function() {
            console.log("iframe 加载完成事件触发");
          
        };
        
        iframe.onerror = function() {
            console.log("iframe 加载出错");
            loadTip.innerHTML = "iframe 加载失败";
        };
    </script>
</body>
</html>
